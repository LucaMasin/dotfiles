# name|type|source|target|enabled|description
#
# type=link   Symlink source to target, backing up an existing real target first.
# type=source Insert a managed source block into target.
#
# Sources without a leading / or ~ are relative to this dotfiles repo.

zsh|source|zsh_config,shell_config|~/.zshrc|true|Zsh plugins, keybindings, aliases, and shell shortcuts
tmux|link|.tmux.conf|~/.config/tmux/tmux.conf|true|Tmux configuration
wezterm|link|.wezterm.lua|~/.wezterm.lua|true|WezTerm configuration
nvim|link|.config/nvim|~/.config/nvim|true|Neovim configuration
scripts|link|scripts|~/scripts|true|Personal helper scripts
agents|link|.agents|~/.agents|true|Agent-compatible global skills
opencode|link|.config/opencode/opencode.jsonc|~/.config/opencode/opencode.jsonc|true|OpenCode CLI configuration (default model, build/plan/explore/scout agents)

# Omarchy-managed or non-Omarchy configs are documented but disabled by default.
alacritty|link|.config/alacritty|~/.config/alacritty|false|Disabled: Omarchy manages Alacritty theme integration
i3|link|.config/i3|~/.config/i3|false|Disabled: not used by Omarchy/Hyprland
polybar|link|.config/polybar|~/.config/polybar|false|Disabled: not used by Omarchy/Waybar
picom|link|.config/picom|~/.config/picom|false|Disabled: not used by Omarchy/Hyprland
rofi|link|.config/rofi|~/.config/rofi|false|Disabled: Omarchy uses Walker by default
zathura|link|.config/zathura|~/.config/zathura|false|Disabled by default; enable if wanted
